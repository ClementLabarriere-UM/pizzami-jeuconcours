<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Concours - 20 Ans Pizza Mi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #ffffff; /* Vert vif */
            --dark-grey: #5DB52C;
            --white: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Image de fond appétissante (sombre pour faire ressortir le texte) */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
        }

        /* Effet Glassmorphism (verre fumé) pour le conteneur */
        .container {
            background: #5DB52C;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 550px;
            border-top: 6px solid var(--primary-green);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-green);
            margin: 0 0 5px 0;
            font-size: 2.5em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(57, 255, 20, 0.3);
        }

        p.subtitle {
            text-align: center;
            margin-bottom: 35px;
            font-size: 1.1em;
            font-weight: 400;
            color: var(--white);
        }

        p.subtitle span {
            color: var(--primary-green);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label.main-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Design des champs de texte pour tablette */
        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 16px;
            border: 2px solid transparent;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1.1em;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        /* Design personnalisé des cases à cocher */
        .checkbox-container {
            display: block;
            position: relative;
            padding-left: 40px;
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 400;
            line-height: 1.5;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 2px;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--primary-green);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 8px;
            top: 4px;
            width: 5px;
            height: 10px;
            border: solid #000; /* V de validation en noir pour contraster sur le vert */
            border-width: 0 3px 3px 0;
            -webkit-transform: rotate(45deg);
            -ms-transform: rotate(45deg);
            transform: rotate(45deg);
        }

        .checkbox-container a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-container a:hover {
            text-decoration: underline;
        }

        /* Bouton de validation */
        button {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            background-color: var(--primary-green);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.3em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(57, 255, 20, 0.3);
            text-transform: uppercase;
        }

        button:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(57, 255, 20, 0.3);
        }

        .prizes-mention {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85em;
            color: var(--text-muted);
            line-height: 1.4;
        }
        
        .prizes-mention strong {
            color: var(--white);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>20 ANS PIZZA MI !</h1>
    <p class="subtitle">Tentez de gagner <span>+500€</span> de cadeaux</p>

    <script type="text/javascript">var submitted=false;</script>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
    onload="if(submitted) {
        alert('Merci pour votre participation ! Bonne chance 🍕');
        window.location.reload();
    }"></iframe>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLScAw1jRWIlc3ecYIMa0gNgms7KHd6QKcgarUdFoGyQFRMv3lg/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
        
        <div class="form-group">
            <label class="main-label" for="nom">Nom & Prénom</label>
            <input type="text" id="nom" name="entry.1606435517" required placeholder="Ex: Jean Dupont">
        </div>

        <div class="form-group">
            <label class="main-label" for="email">E-mail</label>
            <input type="email" id="email" name="entry.1475481058" required placeholder="jean.dupont@email.com">
        </div>

        <div class="form-group">
            <label class="main-label" for="tel">Téléphone</label>
            <input type="tel" id="tel" name="entry.1666531518" required placeholder="06 00 00 00 00">
        </div>

        <label class="checkbox-container">Je confirme avoir acheté une pizza aujourd'hui (1 participation par jour et par commande).
            <input type="checkbox" id="purchase" name="entry.312245554" value="Oui" required>
            <span class="checkmark"></span>
        </label>

        <label class="checkbox-container">Je suis majeur et j'accepte le <a href="https://pizzami.fr/jeu-concours" target="_blank">règlement du jeu</a>.
            <input type="checkbox" id="terms" name="entry.2051298726" value="Oui" required>
            <span class="checkmark"></span>
        </label>

        <label class="checkbox-container">Je souhaite recevoir les offres et nouveautés de Pizza Mi par SMS/E-mail.
            <input type="checkbox" id="newsletter" name="entry.640920916" value="Oui">
            <span class="checkmark"></span>
        </label>

        <button type="submit">Valider ma participation</button>
    </form>

    <p class="prizes-mention">
        <strong>À GAGNER :</strong> Tablette tactile, bons d'achats à La Fabrik à déco, La Baraka, Le Clos des Oliviers, Le Bar de l'Europe, Lou Mouli d'Oli, l'Établi et La Concorde !
    </p>
</div>

</body>
</html>
